<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FIRE VAULT Admin</title>

  <style>
    body {
      background: #0f0f0f;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    h1 {
      color: gold;
    }

    table {
      width: 90%;
      margin: auto;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border: 1px solid #333;
    }

    th {
      background: gold;
      color: black;
    }

    tr:hover {
      background: #1a1a1a;
    }
  </style>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>

<body>

<h1>🔥 FIRE VAULT ADMIN</h1>

<table>
  <thead>
    <tr>
      <th>Player ID</th>
      <th>Package</th>
      <th>Amount</th>
      <th>Reference</th>
      <th>Time</th>
    </tr>
  </thead>

  <tbody id="ordersTable"></tbody>
</table>

<script>

// 🔥 YOUR FIREBASE CONFIG (same as script.js)
const firebaseConfig = {
  apiKey: "AIzaSyDnwV4nIVyl1roL2jtgc1_YLcvyYCGKj2Y",
  authDomain: "fire-vault-22555.firebaseapp.com",
  projectId: "fire-vault-22555",
  storageBucket: "fire-vault-22555.firebasestorage.app",
  messagingSenderId: "589168743870",
  appId: "1:589168743870:web:38210ca30165a196d515ef"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🔥 LOAD ORDERS
db.collection("orders")
  .orderBy("time", "desc")
  .onSnapshot((snapshot) => {

    let table = document.getElementById("ordersTable");
    table.innerHTML = "";

    snapshot.forEach((doc) => {
      let order = doc.data();

      let row = `
        <tr>
          <td>${order.playerId}</td>
          <td>${order.package}</td>
          <td>₦${order.amount}</td>
          <td>${order.reference}</td>
          <td>${order.time}</td>
        </tr>
      `;

      table.innerHTML += row;
    });

  });

</script>

</body>
</html>
